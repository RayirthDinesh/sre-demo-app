name: CI

# Trigger only on pushes to main and to any bug/* branch.
# The bug/* branches are the ones the Self-Healing SRE Agent watches: a push
# there runs the suite, and on failure the agent gets notified to diagnose/fix.
on:
  push:
    branches:
      - main
      - "bug/*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull the repo contents into the runner.
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install the Python interpreter the pipeline runs on.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install project dependencies. This can fail by itself (e.g. an
      #    incompatible pinned version) — that's a legitimate pipeline failure
      #    and is captured in run.log below so the agent can diagnose it.
      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          pip install -r requirements.txt 2>&1 | tee -a run.log

      # 4. Run the test suite. -v --tb=long keeps the output verbose enough for
      #    an LLM to read the failing assertion and full traceback. pipefail
      #    makes the step (and job) fail if pytest fails, even through tee.
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          pytest -v --tb=long 2>&1 | tee -a run.log

      # 5/6. Always notify the webhook server — on failure so the agent can act,
      #      and on success so it knows a previous fix worked. job.status is
      #      "success" only if every step above passed; otherwise "failure".
      #
      #      Values are passed in via env (not inline ${{ }}) so quotes/newlines
      #      in them can't break the shell. The JSON body is built with python3
      #      (always present on the runner, stdlib only) which escapes the logs
      #      safely, written to a file, then POSTed with curl -d @file.
      - name: Notify webhook
        if: always()
        shell: bash
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then STATUS="success"; else STATUS="failure"; fi

          # Build the payload with python's json module so the full pytest
          # output (newlines, quotes, tracebacks) is escaped correctly.
          STATUS="$STATUS" python3 - > payload.json <<'PY'
          import json, os
          try:
              logs = open("run.log").read()
          except FileNotFoundError:
              logs = "no logs were captured"
          print(json.dumps({
              "repo": os.environ["REPO"],
              "branch": os.environ["BRANCH"],
              "commit_sha": os.environ["COMMIT_SHA"],
              "workflow_run_id": os.environ["RUN_ID"],
              "test_logs": logs,
              "status": os.environ["STATUS"],
          }))
          PY

          echo "Payload bytes: $(wc -c < payload.json)"  # debug: must be > 0

          # WEBHOOK_URL points at the server; kept in a secret so the IP isn't
          # committed. WEBHOOK_SECRET must match the server's .env so the
          # X-Webhook-Secret header passes its 401 check.
          # Strip any stray whitespace/newline from the secret values. A
          # trailing newline in a GitHub secret makes curl emit a header with
          # an embedded newline → malformed HTTP → the server rejects it with
          # "Invalid HTTP request received" before it's even parsed as a POST.
          WEBHOOK_URL="$(printf %s "$WEBHOOK_URL" | tr -d '[:space:]')"
          WEBHOOK_SECRET="$(printf %s "$WEBHOOK_SECRET" | tr -d '[:space:]')"

          # The server uses uvicorn's httptools parser, which handles curl's
          # automatic "Expect: 100-continue" correctly — no client-side
          # workaround needed.
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -d @payload.json
